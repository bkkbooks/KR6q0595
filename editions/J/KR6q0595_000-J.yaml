body:
  text: 翠崖禪師語錄序世運隆替存乎數法運盛衰關于時上下千古恒相倚伏于其際也孝宗紹興年間號南宋中興大慧禪師奉旨唱道徑山及吾寧育王旺化多載腳下龍象九十有四分布寰區燈傳燈派衍派所謂截瓊枝寸寸是玉析栴檀片片皆香法運之盛烜赫一時今上御宇化行中外道重桑門別庵禪師以大慧十七世孫自西蜀來寧主普陀法席予適以終養還里得與論道談心良稱厚善剛十餘年腳下龍象已三十有餘翠崖和尚其首出也印心後即開法武林之永壽未幾入閩過粵弘法獅林再遷燕都主觀音領嘉興說法如雲雨棒喝若雷霆凡王公卿士莫不欽崇道範徵詰玄旨直使普陀正眼照天照地運會之隆固有定數遭遇斯時豈屬偶然翠公其人殆不可以尋常測矣其四會語錄若干卷今檢其關于節要者登諸梨棗丐序于予予雖未入宗門堂奧然與公辱兩世交序曷能辭語云得兔忘蹄得魚忘筌有能于語言文字之外得公旨者即視茲錄為筌蹄也亦可時康熙戊寅仲冬下浣賜進士出身工科都給事古堇屠粹忠頓首撰翠崖必禪師語錄敘吾儒之道綱維世教人倫攸繫聖經賢傳固足多也雖諸子百家不必其理之純而言之有裨於世足為經傳之羽翼者皆能有以示來茲傳後世釋氏之教木鐸習俗四大本空拈花會意不立文字使其回心向道毋滋障也自達磨再傳而信心銘作闡揚詳複嗣是公案語錄盈於几閣較富儒書吁亦盛矣哉翠崖和尚本貫名族夙秉慧契遍參諸方得法於普陀之別庵禪師別庵者繼高峰三山老人之後承大慧之傳者也和尚既受付囑想慕其為人其在浙之永壽寺也以眾紳之請其駐錫豫之獅林禪院也以閩帥施侯之請其禮五臺進長安而入觀音禪院也則應貴戚之命侍者裒其前後陞座之語彙若干卷問敘於余余伏念聖天子乘金輪以御世崇儒重佛佑啟禪宗法幢遍於海內矣其間或以盲師瞽說妄自稱尊以博榮名利養未幾而剎竿旋倒視翠公和尚真心莫二玅契玄源賢於庸眾遠矣且能通儒書善屬文可收為吾黨也昔雪浪恩公常言不讀萬卷書不知佛法吾於翠公其信然哉若夫法語之揭大意暢宗風可信今傳後具法眼者自能品題固非余之所知而亦無俟余之多言也爰是以弁其首時康熙三十二年歲在癸酉寎月欽差戶部興平倉掌印監督刑部山東清吏司主事署福建清吏司郎中事充大清律例館纂修官秋谷曹廣端玉淵氏譔翠崖必禪師語錄目次序啟卷之一上堂卷之二小參機緣佛事題讚頌古卷之三源流頌

body:
  text: 侍者道通記録小參除夕小參晷運不相饒歲序相催逼寒梅鬥雪開香風初破玉王老夜燒錢杯盤多狼藉爆竹聲中一歲除溪山處處開新緑煙霞夢入故園春高喚天涯未歸客遂高聲召衆云大衆莫教空過好時光明朝又是正月一小參古人道從門入者不是家珍但有一言半句須自胸中流出自然蓋天蓋地山僧則不然到者裏直須入門入得門了無上至寶百千妙義一任流出大闡吾宗乃張口云諸人還見麼山僧舌尖上吐出血滴滴喝一喝云休瞌睡好留同參寒谷上座小參才過新年頭鶯啼拖弱柳風林淑氣新風光仍似舊世情淡處道情濃鐵壁銀山齊踢倒鼇山成道舊芳規白頭如新直到老窮玄既透向上關何用他方更尋討夜來一陳風雨聲庭前花落知多少大衆秪如投機一句又作麼生展演拈拄杖云一條拄杖兩人扶只要話行窮浩渺卓拄杖一下居士法滿年七十求剃度小參趙州八十猶行腳七十披緇未是遲早晚修持無間斷歸家有路到蓮池舉起數珠云還會麼士無語師云百八摩尼真妙執不怕老從頭上來和碩親王對靈小參勤勞為國萬民歡海晏河清宇宙寬千載江山宜永鎮如何擺手出長安恭惟親王殿下玉葉長春匡佐熙朝社稷赤心捧日把定清室乾坤山河一統天子萬年正堪共享升平同垂化育豈意俄爾碧殿風生玉階塵動正當今日轉功就位一句作麼生道昨夜星河轉南斗無生國裏湧金蓮瑞金龍山生生禪院分座解七小參師云一二三四五六七七六五四三二一從頭數目甚分明怎奈無人領會得諸仁者莫放逸喝一喝云驀然打破上頭關甕裏何曾走卻鱉機緣到長壽謁石蓮和尚蓮問船來陸來即不問即今落在甚麼處師云向腳下薦取蓮云除了腳下又作麼生師云覿面更分明蓮云未見落處在師云話頭也不識蓮云大師話頭在麼師云有水皆含月無山不撈雲復問至廣幾次了師云未動腳跟早已到過蓮云問正經話師云那一句不正經蓮云普陀和尚大慧一枝是否師云是蓮云大師出其門下果與諸方不同師云即今不著便到聖感謁霽崙和尚問聞兄曾進廣中是否師云是霽云到曹溪麼師云到霽云見六祖麼師云何處不見霽云未見六祖在師云和尚且喫茶霽云喫茶與曹溪何干師云到口方知霽微笑師云卻遇著箇迦葉居士參禮拜起問某誦金剛經五眼處不明請問和尚如何是肉眼師云你看著我如何是慧眼師云我看著你如何是天眼師打云照顧頂門如何是法眼師卓拄杖一下如何是佛眼師云當面覷不見進云不會師云通身是眼因甚麼不會士禮拜師打云一棒一條痕進云和尚婆心太切師云知痛癢始得士有省智祥禪人詣方丈云某甲看破了也師云看破箇甚麼進云謾我一點不得師云速道速道進云踏著稱鎚硬似鐵仙橋原是紗帽石師打云未許草草承當祥禮拜云果然恩大難酬師乃以偈印之僧問如何是奪人不奪境師云滿園春色阿誰賞如何是奪境不奪人師云偏你來時不遇春如何是人境兩俱奪師云夜盡水寒漁罷釣如何是人境俱不奪師云出門俱是看花郎僧問如何是第一句師云暮夜波斯偷過海如何是第二句師云天明石女渡黃河如何是第三句師云你是因語生解漢僧喝師打出居士問十智同真請師垂示師云逐一問來如何是一同一質師云團圞秪一箇如何是二同大事師云一箭定山河如何是三總同參師云燈籠和露柱如何是四同真智師云參透目前機如何是五同遍普師云杲日當空照如何是六同具足師云春來滿眼新如何是七同得失師云枝頭花狼藉如何是八同生殺師云寶劍露鋒鋩如何是九同音吼師云一聲驚宇宙如何是十同得入師云吹入我門來進云是何物兮同一質師云兩箇五百是一貫那箇與君同大事師云巖前石虎孰能與我總同參師云胡張三黑李四何人同此一真智師云認著依然還不是是甚麼兮同遍普師云一月普現一切水阿那箇同具足師云一切水月一月攝甚麼物兮同得失師云大蟲被虎咬作麼生同生殺師云如箇居士堪喫棒與誰説法同音吼師云兩箇黃鸝鳴翠柳與甚麼人同得入師云一行白鷺上青天士禮拜師云會麼士云不會師云徒然説夢佛事懸鐘板叢林號令佛祖權衡高高懸向堂前擊著心空及第指鐘板云見麼擊鐘板云聞麼雖然如是切忌觸著磕著嶺擊鐘板一下徑山掃慧祖塔拈香云遠孫海上來覿而無別説寶光塔點首全機俱漏泄一派源流雙徑長大海潮聲吼不絶大展三拜曹溪禮六祖真拈香云亙古曹溪遍大千人間無水不歸源花開五葉本同蒂月印千江影共圓西蜀派連雙徑脈高峰枝發普陀巔祖師面目分明在殃及兒孫無了年便禮拜為法華山德修禪師對靈師卓拄杖云德修何以修須得大徹悟山僧到此間指出菩提路且道菩提路在甚麼處良久云朵朵蓮花開沼上紛紛梅雪落巖前復卓一卓傳黑子請為母韓孺人起棺拈拄杖擊棺云生死關頭休錯踏長安大道甚分明乃畫相云若向者裏會得不妨撩起便行且道韓老孺人轉身一句又作麼生喝一喝拽拄杖引出掩棺七十五年無休歇生緣已了萬事畢即今四大已分離淨裸裸地有何説無可説拋土云不妨土上再加泥平地蓮花今湧出卓拄杖三下為陳氏孺人法名界明起棺久居塵勞未離衆苦才得回頭即歸淨土歸淨土日卓午目前大道是西方九品蓮花為父母若還擬議不能前腳下白雲千萬朵以拄杖擊棺引出為威翁帥公護法對靈揮拂子云調羹補袞擎天手武緯文經社稷安擺手便行歸去也山河大地雪漫漫恭惟威翁大護法朝中梁棟佛國金湯正思熙朝永固孰期踢倒玉樓今日山僧到此以何報薦喝一喝云當陽指出西方路爐透起白蓮花為師氏太夫人對靈靈山記莂皇眷恩厚時節一至便乃撒手葉落歸根烏飛兔走不戀長安藏身北斗莫是帥府太夫人底落處麼良久云九盡遍看冰雪化春來樹樹盡開花為齊氏太夫人對靈本無來燈籠𨁝跳上天台亦無去夜半鐵牛吞露柱既無來去寧有死生既無死生即今齊太夫人畢竟在何處安身立命喝一喝為葉氏孺人對靈揮拂子云才見春光今又過風來片片落花多滿園春色皆狼藉可歎光陰有幾何雖然如是即今葉氏孺人一口氣不來向什麼處去以拂子打云會得箇中真消息一輪明月落清波為祥翁厲護法對靈春風蕩蕩春日遲遲山青水緑花落鳥啼悠然回首識取歸期歸期已至且祥翁老護法臨行一句作麼生道雖有雲山千萬里目前大道更分明卓拄杖一下為尤太夫人對靈居諸邁往速遷變八十年來如夢幻不戀長安歸故鄉一心頓入空王殿以拂子打相云尤太君若向箇裏薦得生本無生滅亦無滅一念萬年諸緣頓息山僧到此只得無法可説無可説有可説覿面分明春風習習像讚愍忠寺觀音像讚朝到西天暮歸南海長安市上相逢處處得大自在驢鳴犬吠現圓通一任燒香勤禮拜鐵壁祖像讚天生吾祖器骨不群十坐道場大振聚雲雙徑一枝佛法從茲延蔓牽藤至今誰人不識大慧十五世孫三山祖像讚者老漢婆心切拈起拂子當面擲南方祖道賴重興衲僧命根遭斷絶據曲彔於高峰頂上電閃雷轟流滴水於南海波中東涌西沒咄殃及後代兒孫到處呵佛罵祖搖唇鼓舌盤山轉常老宿像讚六十春秋一生誠實本地風光孤明歷歷盤山兀坐兮非佛非心輪珠常轉兮即心即佛咄哉面目甚分明拄杖頭邊應漏泄鄂陽大師小像讚非道非仙不僧不俗一緉芒鞋周遊列國有時在西域于闐遊戲有時在天台華頂獨宿一任時人錯認湘子真容喚他祖師面目咄足雨和尚索題達磨小像讚折蘆過江滿目慚惶見性成佛毒藥砒霜西天東土無處收藏引得後代兒孫到處家醜外揚題曇獻禪人小影不解參禪偏能解脫愛住深山一心念佛持律甚精嚴皎如霜與雪平生伎倆少人知一朵曇花先現出自題小像詳上座請優遊石上兀坐松間手拈如意若風若顛佛法不會祖道無傳一條拄杖遊遍大千面目分明交付汝任把香薰鼻孔尖頌古世尊初生氣宇如王輸一籌琵琶遮面半風流雲門總有知恩處一句當陽未足酬産難因緣忽見枝頭黃鳥啼一聲高叫一聲低東君暗裏傳消息一夜林間花放齊女子出定夜半金烏海底生飛鳧驚起弄黃昏西風昨夜園林過吹落黃花滿地金六祖風幡當于起處究源根不是風幡不是心莫認老盧口頭話黃鸝空叫百般音佛性有無狗子佛性無瞿曇老子嘴都盧狗子佛性有海底泥牛銜月走佛性有無甚分明摸著鼻孔失卻口大道透長安終日騎牛更覓牛一番風雨一番愁分明腳下長安道何必茫茫在外求訪二菴主南山花發北山紅黃鳥枝頭調不同只為東君心太切花開花落在春風溈山水牯牛不是溈山不是牛腰纏騎鶴上揚州驢胎才出馬腹更向人前出一頭婆子燒菴正恁麼時難覆藏當陽露出好風光箇中不遇攀花手空使落花流水香南泉斬貓寶劍光鋩出匣時趙州恁麼卻來遲南泉正令行將去血濺梵天遍界知南泉賣身千方思賣向人前鬼面神頭真可憐且道何人肯酬價看來不直半文錢倩女離魂懷抱琵琶往帝邦一回清夢轉家鄉惺來淚落三更月依舊連身臥客房乾矢橛是佛何勞安矢橛分明注破向誰説白鷺飛來雪上行梅花影落天邊月洞山麻三斤人來問佛麻三斤數目分明説與君點破當人端的事也須識得定盤星雪覆千山一色平鋪世界新山河隨處露全身古今賢哲多如評不識何人豁眼睛香嚴擊竹一聲霹靂頂門轟潭底驚翻起臥龍雲雨卻隨風勢轉須彌𨁝跳九霄峰靈雲見桃花三春處處桃花放偏向靈雲眼裏栽盡在玄沙言裏薦時流眼底著塵埃新婦騎驢阿家牽新婦騎驢阿家牽同行不必痛加鞭許多風月移情趣總在佳人笑臉邊無位真人梨花蛺蝶鬧芳菲花雨巖前陳陳飛一夜東風俱漏泄殘紅飄落釣魚磯須彌山劍刃上行冰上走拈來信手道由口金剛寶劍輕拋卻八面清風過牛斗洗鉢盂話巖前枯木遇春風苑內黃鶯怨落紅箇裏機關輕撥轉禹門一跳便成龍庭前柏樹子黃鳥枝頭報好音庭前指示太分明攀枝摘葉人無數幾箇能知當處尋青州布衫重七斤趙州做領青州衫蓋卻南山并北山識得其中較些子翻身跳出鐵蛇關一口吸盡西江水龐公卻被馬師謾吸盡西江口不沾海底紅塵飛不盡至今大雪滿長安首山竹篦子已離觸背太分明掘地討天腳下尋具眼衲僧能掃卻一毫頭上定乾坤仰山作女人拜好箇佳人不識羞階前賣俏逞風流渾然不顧旁觀誚笑臉微紅踢戲毬世尊有六通你來問我那一通大洋海裏火燒空忽然觸著些些子失卻眉毛滿臉紅白馬清淨法身井底蝦蟆吞卻月豁開正眼明歷歷紅爐焰裏結成冰萬里山河一片白長慶坐破七箇蒲團寒寒暑暑幾多秋受盡風霜未出頭若不捲簾見天下蒲團坐破幾時休爆竹二首百匝千重心自空硝黃滿腹不通風火星觸著紛紛碎雨打梨花遍地紅截斷兩頭一線通心藏妙藥毒無窮當陽漏泄真消息入耳應須三日聾牧牛十二首尋牛四野雲迷曲徑封山遙水遠意何窮關河一片煙霞裏鳥語溪聲過谷東見迹絶頂煙收雲漸開風吹陳陳帶香來青山露出真消息狂走無煩滿面灰見牛白雲吹去露青天草有餘餐飲有泉毛色依稀頭角在穿雲渡水樂長年得牛緊把麻繩驀鼻穿收來樹下自安然臨風嘯落峰頭

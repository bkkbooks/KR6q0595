body:
  text: 侍者道通記録源流頌南嶽第一世南嶽懷讓禪師金州杜氏子年十五出家謁嵩山安公指參六祖祖問甚處來師云嵩山來祖云甚麼物與麼來師無對退參八載復來答云説似一物即不中祖云還假修證也無師云修證即不無染污即不得祖云只此不染污乃諸佛之所護念汝既如是吾亦如是得法後侍祖一十五載復居南嶽甚麼物兮與麼來當下無言眼未開退參八載明端的遍界空花眼裏栽南嶽第二世江西馬祖道一禪師漢州什邡人姓馬氏幼歲出家開元中習定衡嶽遇讓和尚問云大德坐禪圖甚麼師云圖作佛讓將磚一片于彼菴前石上磨師云磨作甚麼讓云磨作鏡師云磨磚豈得成鏡耶讓云磨磚既不成鏡坐禪豈得成佛師云如何即是讓云如牛駕車車若不行打車即是打牛即是師無對讓云汝學坐禪為學作佛若學坐禪禪非坐臥若學作佛佛非定相於無住法不應取捨汝學作佛即是殺佛若執坐相非達其理師聞開示如飲醍醐乃受心印開法南昌寶峰山僧問和尚為甚麼説即心即佛師云為止小兒啼僧云啼止時如何師云非心非佛僧云除此二種人來如何指示師云向伊道不是物其化盛行江西磨磚坐佛兩俱非撥轉牛車露大機悟徹心空真印後精金百煉愈光輝南嶽第三世洪州百丈懷海禪師福州長樂人姓王氏丱歲出家三學該練及參馬祖為侍者偶侍祖行次見野鴨飛過祖云是甚麼師云野鴨子祖云甚處去也師云飛過去也祖扭師鼻師負痛失聲祖云又道飛過去也師有省一日再參祖震威一喝師三日耳聾後黃檗聞舉不覺吐舌群飛野鴨白雲邊扭痛鼻頭甚可憐一喝耳聾千古意雄峰從此浪彌天南嶽第四世洪州黃檗希運禪師閩中人幼歲出家至京洛行乞吟添鉢聲一嫗出扉問曰太無厭生師云汝猶未施責我無厭何耶嫗笑而掩扉師異之後往南昌見馬祖祖已示寂時百丈為祖廬墓師見丈丈舉耳聾話師吐舌丈云汝嗣馬祖去師云某來參馬祖不料無緣因和尚斯舉得見馬祖大機大用若嗣馬祖恐以後喪我兒孫及開法上堂衆才入師召云大衆衆回首師云月似彎弓少雨多風聞舉舌頭忙吐出大張機用顯全才月似彎弓論風雨棒頭有眼豁然開南嶽第五世鎮州臨濟義玄禪師曹州南華人姓邢氏落髮進具志慕禪宗初參黃檗三度問佛法的的大意三度被打及到大愚處悟徹于大愚脅下築三拳復轉黃檗打黃檗一掌後臨滹沱河側開堂建立黃檗宗旨號臨濟宗三遭痛棒還拳處長劍倚天會者稀佛法無多親口出當陽一句露真機南嶽第六世魏府興化存獎禪師初在臨濟為侍者因訊洛浦來參機緣兩遭濟打及到三聖處為首座聖問師師便喝聖云須是你始得復到大覺處為院主覺問師師便喝覺便打師又喝覺又打次日覺又問師師亦喝覺亦打師再喝覺再打至脫下衲衣痛與一頓處直下薦得臨濟在黃檗喫棒底道理逮後開堂拈香云者瓣香本為三聖師兄三聖于我太孤本為大覺師兄大覺于我太賒不如供養臨濟先師大作雷聲無點雨棒頭撥轉目前機其中薦得孤賒處臨濟先師供養伊南嶽第七世汝州南院慧顒禪師得法于興化獎開堂後有僧來參云敗也師引杖向其前僧無語師便打數棒殺活臨機用最親禪床掀倒不知音棒頭點出金剛眼啐啄同時有幾人南嶽第八世汝州風穴延沼禪師餘杭劉氏子參南院院問南方一棒作麼商量師曰作奇特商量師卻問和尚此問一棒作麼商量院拈拄杖曰棒下無生忍臨機不見師師于言下大徹玄旨遂依止六年明明心印鐵牛機棒下無生不見師掣電轟雷能殺活豁然句裏悟玄微南嶽第九世汝州首山省念禪師萊州狄氏子參風穴穴上堂舉世尊以青蓮目顧視大衆乃曰正當恁麼時且道説箇甚麼若道不説而説又是埋沒先聖且道説箇甚麼師乃拂袖下去穴擲下拄杖歸方丈次日師與真園頭同上問訊次穴問真曰作麼生是世尊不説説真曰鵓鳩樹頭鳴又問師曰汝作麼生師曰動容揚古路不墮悄然機穴謂真曰汝何不看念法華下語世尊顧視青蓮目直下承當更不疑拂袖便行多瀟灑當陽不墮悄然機南嶽第十世汾州太子院善昭禪師太原俞氏子幼有大智一切文字不由師訓自然通曉剃髮遊方遍參尊宿七十一人最後見首山問百丈捲席意旨言下大悟拜而起云萬古碧潭空界月再三撈摝始應知參遍諸方猶不歇霜眠露宿訪師來應知皓月澄潭現放下身心曠劫灰南嶽第十一世潭州石霜慈明楚圓禪師全州清湘李氏子少為書生年草二得度母賢遣之遊方聞汾陽道望冒險往來依住二載未許入室一夕訴曰自至法席不蒙指示歲月飄忽己事不明失出家之利陽熟視罵詈舉杖逐之師擬伸救陽以手掩其口師大悟歎曰始知臨濟道出常情披星戴月謁汾陽開口無端罵一場拄杖拈來開正眼始知濟道出情常南嶽第十二世袁州楊岐方會禪師宜春令氏子久依慈明未有省發每咨請明云庫司事繁且去他日又問明云監寺異時兒孫滿天下在何用忙為明適出師偵之小徑既見搊住云老漢今日須與我説不説打你去明云監寺知是般事便休語未卒師大悟即拜于泥途開法楊岐僧問少林面壁意旨如何師云西天人不會唐言西天人不會唐言箇事當場啓口難堪憶少林常面壁覺來無地著羞漸南嶽第十三世舒州白雲守端禪師衡陽葛氏子依茶陵郁披剃往參楊岐岐問受業師為誰師云茶陵郁和尚岐云聞伊過橋遭什有偈能記否師舉云我有明珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬朵岐笑而趨起師愕然通夕不寐黎明咨詢之岐云汝見昨日打驅儺者麼師云見岐云汝一籌不及渠師愈駭然云何謂也岐云渠愛人笑汝怕人笑師大悟照乘明珠覿面呈笑中有意愕然驚忽從句裏翻身去衣裏寒光耀更真南嶽第十四世蘄州五祖法演禪師綿州鄧氏子年三十五始祝髮遍參名宿因浮山指見白雲問南泉摩尼珠話雲叱之師領悟獻投機偈曰山前一片間田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風雲特印可雲一日謂師曰有數禪客自廬山來皆有悟入處教伊説亦説得有來由舉因緣問伊亦明得教伊下語亦下得秪是未在師于是大疑私自計曰既悟了説亦説得明亦明得如何卻未在遂參究纍日忽然省悟從前寶惜一時放下走見白雲雲為手舞足蹈師亦笑而已師後曰吾因茲出一身白汗便明得下載清風人人有片間田地何必叮嚀問主翁一笑通身流白汗忽然脫體露真風南嶽第十五世成都昭覺克勤佛果禪師彭州駱氏子兒時日記千言見佛書如獲舊物出家首謁玉泉皓次依金鑾信大溈哲黃龍心東林度僉指為法器而晦堂稱他日臨濟一派屬子矣最後見五祖盡其機用祖皆不諾師忿然而去到金山染寒困極試以平日見處無得力者乃轉依五祖令入侍寮聞舉提刑小艷詩話祖云他秪認得聲師云他既認得聲為甚麼卻不是祖云如何是祖師西來意庭前柏樹子聻師忽有省出門見雞飛上闌干鼓翅而鳴復自謂云此豈不是聲遂袖香入室通其所得祖云佛祖大事非小根劣器所能造詣吾助汝喜由此所至推為上首雞上欄杆鼓翅鳴夢中驚覺五陵春香風滿袖通身快秪要檀郎認得聲南嶽第十六世臨安徑山大慧宗杲普覺禪師宣城奚氏子年十六出家十七落髮十九遊方謁湛堂後參圜悟聞薰風自南來殿角生微涼語省豁悟每舉有句無句話問之師擬開口悟便云不是一日師問悟云聞和尚曾問五祖師翁來不知道箇甚麼悟笑而不答師云當時想是對衆問今日説亦何妨悟云我問有句無句如藤倚樹意旨如何祖云描也描不成畫也畫不就又問樹倒藤枯時如何祖云相隨來也師當下釋然悟云始知我不汝欺也遂著臨濟正宗記付之薰風南起閣生涼諸佛明明不覆藏萬朵白雲吹散去當陽一片露堂堂南嶽第十七世福州西禪懶菴鼎需禪師本郡林氏子幼舉進士偶看遺教經歎曰幾為儒冠所誤欲去家母以親迎難之師絶之以偈云夭桃紅杏一時分付春風翠竹黃花此去永為道伴竟依保壽出家遍參名宿後依大慧慧問內不放出外不放入正恁麼時如何師擬開口慧拈竹篦連打三下師于此大悟厲聲云和尚已多了也慧又打師禮拜慧印以偈一日上堂云懶翁懶中懶最懶懶説禪亦不重自己亦不重先賢又誰管你地又誰管你天物外翛然無箇事日上三竿猶更眠拈來竹篦甚分明棒下承當得本真最懶説禪無可説三竿日上懶翻身南嶽第十八世福州鼓山木菴安永禪師閩縣吳氏子弱冠為僧謁懶菴于雲門懶問不問有言不問無言世尊良久不得向世尊良久處會隨後便喝師倏然契悟作禮云不因今日問爭喪目前機懶許之上堂拈拄杖云臨濟小廝兒未曾當頭道著今日全身放憨也要諸人知有擲拄杖下座問得分明答豈差一聲喝出絶周遮目前驚散浮雲盡月印千江玉浪花南嶽第十九世杭州淨慈晦翁悟明禪師福州人上堂舉夾山會下一僧到高亭才禮拜亭便打僧云特來禮拜亭亦打又拜亭又打趁出僧回舉似夾山山云會麼僧云不會山云賴汝不會汝若會即夾山口啞去應菴拈云高亭一期忍俊不禁爭奈拄杖放行太速者僧當時若是箇漢莫道高亭夾山便是達磨大師出來也斬為三段何故家肥生孝子國伯有謀臣師云高亭夾山門庭施設各得其宜但中間一人較些子應菴與麼道也是鞏縣茶瓶師纂修聯燈會要門庭施設法中王正令全提孰敢當識得中間較些子聯燈千古繼心光南嶽第二十世太原苦口良益禪師參淨慈慈問近離甚處師云瑞光慈云正與麼時光在甚處師便喝慈云且止汝道西湖水深多少師擬議慈便打趁出久之契悟作偈曰臨機一句不露絲頭吹毛才展大地全收師云從上心印汝今得之宜處深谷俟時行化問到西湖水淺深棒頭點出甚分明臨機一句吹毛劍從上心珠印得真南嶽第二十一世汾州筏渡普慈禪師初參徑山端高峰妙各有契處後北還過燕遊五臺禮文殊感大士放光居臺二年入太原參益和尚益云發足甚處師云五臺益云文殊與汝説甚麼師云腳下草鞋唱成一百文益云腳跟為甚麼不點地師云且喜老漢見得親切益云老僧罪過師喝一喝而出自此常造室中久之益囑云汝緣當在本處他後設大法藥宜號筏渡師禮謝歸汾州徑山參過謁高峰猶是文殊光影中草鞋踏斷真消息一喝當陽播正宗南嶽二十二世洛京相國一言道顯禪師雁門人生而岐嶷穎悟英特年十二自願出家父母難之師云兒志決矣未可強留遂落髮于郡之西山聽講圓覺至知幻即離章頓然默契恍若舊識乃辭師遊汾州謁筏渡渡一見器之命入侍寮一日渡舉竹篦問云畢竟喚作甚麼師方進語渡驀頭便打忽然大悟禮拜云和尚且止古人道佛法無多子非虛語也渡云汝今方知吾意耶師云和尚大恩碎身難報渡囑云汝年且幼時至理彰師執勞座下一十七載竹篦拈來活似龍驀頭一棒悟心空無多佛法明今古恩大難酬此日功南嶽第二十三世西京小菴行密禪師初以白衣禮相國顯和尚凡見便禮拜顯一日謂云道人禮拜且止佛法在甚處師方舉首忽聞板聲鳴顯云只者是師從此有入遂求度顯云汝誠精進宜名行密力參三年顯舉馬祖三不是語未絶師云畢竟如何顯笑云已多了也師于言下釋然大悟顯云佛法下衰正宜潛隱毋拘城隍得安身處最為佳耳一聲板響通消息惹得三年滿腳泥聞舉南泉三不是忽于句下悟全機南嶽第二十四世二仰圓欽禪師禾之秀水人遍參諸方毫無所契入西京謁小菴密于旅舍密問浙中有箇伶俐人汝還見麼師云圓欽鈍漢密云我要箇鈍漢作監收汝還知麼師罔措密云數千里來可惜錯過師相依扣參一日見鼠從架上過撲翻油甕忽爾頓契走見密云某已捉得了也密搊住云道道師云一粒鼠糞污卻鍋羹密云瞎漢參堂去數千里來幾錯過油甕翻時滋味長鼠糞鍋羹污卻了和盤托出露當陽南嶽第二十五世壽州無念智有禪師蜀之漢州人出峽遊四明登天目後參二仰欽欽云行腳甚處師云南方欽云彼中佛法如何師云山川無異欽云我手何似佛手師良久欽云莫道無異好後看興化打維那因緣始浩然大徹作偈云興化打維那平地遭殃禍昨夜南山雲飛向北山過欽見為之助喜云不辜到此遍歷南方涉四明山川有異一般春南山雲向北山去片片飛來露本真南嶽第二十六世荊山懷寶禪師渚宮人遊壽州謁無念有有云獵縣遊州畢竟為著何事師云生死大事求師拔度有云汝是荊州人麼師云是有云闍黎即今在甚麼處師擬對有云若便恁麼猶較些子佛法不是商量參堂去師潛心座下一日有喚云闍黎師應諾有云在甚麼處師于言下領旨後于嘉靖七年正法付鐵牛遠師隱終南山呼來喚去有何因應答分明豈不親荊山有寶從今識悟得真空一片心南嶽第二十七世秦嶺鐵牛德遠禪師得心印于荊山菴居秦嶺常披一紅布褲一日頂笠揮鋤地中月明聯池過之池見云者漢好似一頭軍師云看箭池作躲箭勢師近前攜手至菴留住三月謂云我乃大慧之裔在此待人數十年矣汝今既來當為我求人光揚祖道付偈云就身能打劫劈筈善奪窩三玄從此出三要不為多探竿影草主賓分獅子迷蹤奈我何身披紅褲當僧衣頂笠揮鋤掘地時好似一軍須看箭光揚祖道露全機南嶽第二十八世敘州朝陽月明聯池禪師本郡范司馬之後幼居窗下有僧過訪不遇題聯于壁師見厭世祝髮杖笠南遊過洛伽道逢一僧偉儀殊相師前行失腳念佛一聲僧云此敲門瓦子何不拋卻師云拋卻後如何僧云葉落歸根來時無口師有省後于秦嶺受印鐵牛返敘州居朱提山朝陽洞聚雲來參師問云如何是古佛心雲拱手云請和尚尊重師問不用音聲與色身將何喚作本來人雲默然師休去朝陽洞口月初明指出當陽古佛心拱手端然請尊重渾忘聲色貴知音南嶽第二十九世忠州聚雲吹萬廣真禪師敘州宜賓人姓李氏以白衣參朝陽多載乃落髮受具一日陽謂師云汝有一句未會在師問那一句陽云不用音聲色身默然良久與我現出真空來師拂袖便出自思此事不可草草此中必有玄要辭往別山苦參三年復見朝陽問云畢竟如何現出陽引師手掩其口豁然大悟囑後師涉海入吳穿閩過粵萬曆戊午于瀟湘湖東開法還蜀闡化聚雲出世三十年五坐道場語録二十卷廣録五十卷行世退參三載聚雲開喜得真空現出來每向紅爐經久煆道行楚蜀顯英才南嶽第三十世忠州治平慶忠鐵壁慧機禪師營山羅氏子家世業儒師生而貌偉器骨不凡八歲隨母持齋稍長厭俗于天啓壬戌剃髮後參聚雲依住一夏不蒙垂示一日雲出方丈師跪泣于前求雲開示雲笑而不答師謂遇至人而無緣得授不如捐軀赴水以待來生有諭以從講肆遊師聽畢復來相依雲命總院事一朝念誦畢登榻一踢渾身骨碎大笑不止拈偈呈雲雲不之印又力究三年忽爾大徹入室密以啓雲雲云汝今才會老僧意那師云和尚大慈為人徹底雲滅後師為廬墓四衆堅請開法平都地藏院十坐道場語録二十卷僧問如何是正法眼藏師云烏龜開夜市渾身骨碎未相許三載參明得寶珠脫殼烏龜開夜市杜鵑啼血染珊瑚南嶽第三十一世忠州高峰三山燈來禪師墊江曾氏子世業儒師早年入泮性好佛書一日讀聚雲古音王傳觸發夙慧年三十從弔巖山南浙二師祝髮參鐵壁機和尚于青山領箇沒得話頭終朝咀嚼不發泣語三巴掌師掌雖本色勉之師愈迷悶適聞笑亭維那讀嚴陽尊者問趙州一物不將來時如何州云放下著師于言下釋然乃撫案大笑亭曰見箇甚麼師與一掌即趨見機和尚機曰作麼作麼師連撫三掌機曰落在甚麼處師作舞而出後隨機和尚掌師山行見浮雲東西飛度師問曰落在甚麼處機和尚向空中指云看掌驀面便掌由此腳跟點地受機和尚囑後開法崇聖凡六坐道場康熙戊申歲嘉禾縉紳請住郡之天寧闡揚道化編梓三代語録入楞嚴大藏流通高峰絶頂全身露但見雲飛西復東驀而掌來如霹靂豁開正眼悟真空南嶽第三十二世寧波普陀別菴性統禪師高梁龍氏子年十二投高峰三山老人剃染二十二受具嘗請益山參究下手工夫山曰只須向自家屋裏打點師遂將平日讀過經史從頭細檢究無一下手處心甚奮急一日聞山舉南泉瓶鵝公案有省山謂曰汝只會得有何曾會得無遂示以狗子無佛性話逾年無所入請益曰秪如會得者箇如何便了得生死山曰既會得者箇如何不了生死心益迷悶後因山舉百丈開義田因緣至展手處大徹玄旨山乃印可山示滅遂繼席高峰尋遷普陀法化之盛風動遐邇正録外著有續燈正統盛行于世心珠早得在高峰拽杖南來正脈通坐斷洛伽消萬派從茲重整舊家風
